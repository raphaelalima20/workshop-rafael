<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop 10K - Página de Vendas</title>

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1547511656890774');
    fbq('track', 'PageView');

    window.addEventListener('load', function() {
      setTimeout(function() {
        fbq('track', 'ViewContent');
      }, 5000);
    });
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1547511656890774&ev=PageView&noscript=1" />
  </noscript>
  <!-- /Meta Pixel -->

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8fb;
      color: #1b1b1f;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(180deg, #1d1d4d 0%, #2c2c63 100%);
      color: #fff;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.18);
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
    }
    p {
      margin: 0 0 32px;
      font-size: 1.05rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.88);
    }
    .button-wrap {
      display: flex;
      justify-content: center;
    }
    button {
      border: none;
      padding: 18px 34px;
      font-size: 1rem;
      font-weight: 700;
      color: #1d1d4d;
      background: #fff;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="card">
      <h1>Workshop 10K</h1>
      <p>Aprenda a construir uma página de vendas de alta conversão e garanta seu lugar no próximo workshop.</p>
      <div class="button-wrap">
        <button id="garantir-button" type="button">GARANTIR MEU LUGAR</button>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var button = document.getElementById('garantir-button');
      if (button) {
        button.addEventListener('click', function() {
          if (typeof fbq === 'function') {
            fbq('track', 'InitiateCheckout');
          }
        });
      }
    });
  </script>
</body>
</html>
